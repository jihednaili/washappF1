<div class="col-md-12">
  <div class="card card-container" style="max-width: 350px; margin: 100px auto; padding: 30px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <h2 style="text-align: center; color: #333; margin-bottom: 25px;">Lavage System</h2>
    
    <div *ngIf="isLoggedIn" style="background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 5px; text-align: center; margin-bottom: 20px;">
      Connexion <strong>réussie</strong> !<br>
      Vous êtes connecté avec les rôles: <br><i>{{ roles }}</i>.
      <br><br>
      <button (click)="tokenStorage.signOut(); isLoggedIn=false" style="padding: 8px 15px; border: none; background: #f44336; color: white; border-radius: 4px; cursor: pointer;">Se déconnecter</button>
    </div>

    <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
      <div class="form-group" style="margin-bottom: 15px;">
        <label for="username" style="display: block; margin-bottom: 5px; color: #555;">Nom d'utilisateur</label>
        <input type="text" name="username" [(ngModel)]="form.username" required #username="ngModel" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" />
      </div>

      <div class="form-group" style="margin-bottom: 25px;">
        <label for="password" style="display: block; margin-bottom: 5px; color: #555;">Mot de passe</label>
        <input type="password" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" />
      </div>

      <div class="form-group">
        <button style="width: 100%; padding: 12px; background: #1976d2; color: #ffffff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s;" onmouseover="this.style.background='#1565c0'" onmouseout="this.style.background='#1976d2'">
          Se connecter
        </button>
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <div *ngIf="isLoginFailed" style="color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 4px; text-align: center; font-size: 0.9em;">
          Échec de connexion: {{ errorMessage }}
        </div>
      </div>
    </form>
  </div>
</div>
